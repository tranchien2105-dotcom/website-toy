version: "3.8"

services:
  app:
    build:
      context: ./docker/php
    container_name: website_toy_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - website_toy

  nginx:
    image: nginx:latest
    container_name: website_toy_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - website_toy

  mysql:
    image: mysql:8.0
    container_name: website_toy_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: website_toy_db
      MYSQL_USER: website_toy_user
      MYSQL_PASSWORD: 123456
    ports:
      - "3308:3306"
    volumes:
      - website_toy_mysql:/var/lib/mysql
    networks:
      - website_toy

  node:
    image: node:22
    container_name: website_toy_node
    working_dir: /var/www
    tty: true
    stdin_open: true
    volumes:
      - ./src:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - website_toy

networks:
  website_toy:

volumes:
  website_toy_mysql: